name: Deploy Vue.js app to GitHub Pages

on:
  push:
    branches:
      - main # or master if your repo uses that

permissions:
  contents: write # 👈 This gives Actions permission to push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build

      - name: Build VitePress blog
        run: npm run docs:build

      - name: Copy RSS feed into blog output
        run: |
          cp docs/.vitepress/dist/feed.xml dist/blog/feed.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: vishnukarthik.me
